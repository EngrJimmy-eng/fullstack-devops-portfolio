version: "3.8"

services:

  nginx:
    image: nginx:stable-alpine
    container_name: ikenna-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - ikenna-net

  backend:
    build: ./backend
    container_name: ikenna-backend
    restart: always
    expose:
      - "5000"
    environment:
      DB_HOST: mysql
      DB_USER: ikenna_user
      DB_PASSWORD: strongpassword
      DB_NAME: ikenna_db
    networks:
      - ikenna-net

  mysql:
    image: mysql:8
    container_name: ikenna-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: strongrootpassword
      MYSQL_DATABASE: ikenna_db
      MYSQL_USER: ikenna_user
      MYSQL_PASSWORD: strongpassword
    ports:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ikenna-net

  frontend:
    build: ./frontend
    container_name: ikenna-frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - ikenna-net

networks:
  ikenna-net:

volumes:
  mysql-data:
