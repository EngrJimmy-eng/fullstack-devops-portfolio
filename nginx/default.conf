worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # =========================
    # BASIC SECURITY HARDENING
    # =========================

    server_tokens off;

    # Block hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 403;
    }

    # Block sensitive/common attack paths
    location ~* /(wp-admin|phpmyadmin|admin|config|backup|\.bak|\.sql|\.zip) {
        return 403;
    }

    # =========================
    # RATE LIMITING (ANTI-BOT)
    # =========================

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=20r/s;

    # =========================
    # UPSTREAMS (clean architecture)
    # =========================

    upstream frontend_upstream {
        server frontend:80;
    }

    upstream backend_upstream {
        server backend:5000;
    }

    server {
        listen 80;
        server_name _;

        # =========================
        # GLOBAL SECURITY HEADERS
        # =========================
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy no-referrer-when-downgrade always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Hide server identity
        server_tokens off;

        # =========================
        # FRONTEND (SPA)
        # =========================
        location / {
            limit_req zone=global_limit burst=30 nodelay;

            proxy_pass http://frontend_upstream;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SPA safety
            proxy_set_header Cache-Control "no-store";
        }

        # =========================
        # API (protected)
        # =========================
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_upstream/;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Prevent abuse via large payloads
            client_max_body_size 10M;

            # Timeout protection (prevents slowloris style abuse)
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # =========================
        # BLOCK COMMON EXPLOITS
        # =========================
        location = /favicon.ico { access_log off; log_not_found off; }

        location = /robots.txt { allow all; log_not_found off; }

        # =========================
        # DENY EVERYTHING ELSE (optional hardening layer)
        # =========================
        location ~* \.(log|ini|sh|sql)$ {
            deny all;
        }
    }
}
